name: Auto-assign PR reviewers

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request-reviewer:
    name: Request reviewer
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Request one reviewer from allowlist
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            const allowedRepoOwner = 'Memact';
            const reviewerAllowlist = [
              'keepsloading',
            ];

            if (owner.toLowerCase() !== allowedRepoOwner.toLowerCase()) {
              core.info(`Skipping reviewer assignment because ${owner}/${repo} is not owned by ${allowedRepoOwner}.`);
              return;
            }

            const normalize = (login) => login.toLowerCase();
            const excludedLogins = new Set([normalize(author)]);

            const { data: reviewRequests } = await github.rest.pulls.listRequestedReviewers({
              owner,
              repo,
              pull_number: pullNumber,
            });

            if (reviewRequests.users.length > 0 || reviewRequests.teams.length > 0) {
              core.info('Skipping reviewer assignment because this PR already has requested reviewers.');
              return;
            }

            for (const reviewer of reviewRequests.users) {
              excludedLogins.add(normalize(reviewer.login));
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            for (const review of reviews) {
              if (review.user?.login) {
                excludedLogins.add(normalize(review.user.login));
              }
            }

            const reviewer = reviewerAllowlist.find((login) => !excludedLogins.has(normalize(login)));

            if (!reviewer) {
              core.info('No eligible reviewer found in allowlist.');
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner,
              repo,
              pull_number: pullNumber,
              reviewers: [reviewer],
            });

            core.info(`Requested PR review from: ${reviewer}`);
